<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isometric World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Isometric World</h1>
      <p class="subtitle">A little world of tiles</p>
    </header>
    <main>
      <canvas id="world" width="800" height="560"></canvas>
      <div class="legend">
        <span class="legend-item grass">Grass</span>
        <span class="legend-item water">Water</span>
        <span class="legend-item sand">Sand</span>
        <span class="legend-item stone">Stone</span>
        <span class="legend-item forest">Forest</span>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
